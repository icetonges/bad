name: DoD Obligation Data — Weekly Pull

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — fetch data but do not ingest'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node 24 now

jobs:
  pull-dod-data:
    name: Pull DoD obligation data from USASpending.gov
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch and ingest DoD obligation data
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: node scripts/fetch-dod-obligations.mjs

      - name: Notify on failure
        if: failure()
        run: echo "::error::DoD obligation pull failed. USASpending.gov may be down or INGEST_URL/INGEST_SECRET secrets may not be configured."
